<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cat Cake 🧁</title>

    <!-- Bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
     <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"
</head>


<body>
<body style="background-color: #fff0f5;">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow" style="background-color: #f8c8dc;">
  <div class="container">

    <a class="navbar-brand fw-bold" href="/">
        <i class="bi bi-cake-fill text-danger me-1"></i> Cat Cake
    </a>

    <div>
        
        <a href="/" class="btn btn-light">
            <i class="bi bi-house-fill me-1"></i> Inicio
        </a>

        <a href="/productos" class="btn btn-light">
            <i class="bi bi-bag-fill me-1"></i> Productos
        </a>

        <a href="/clientes" class="btn btn-light">
            <i class="bi bi-people-fill me-1"></i> Clientes
        </a>

        <a href="/ventas" class="btn btn-light">
            <i class="bi bi-receipt-cutoff me-1"></i> Ventas
        </a>

        <a href="/acerca" class="btn btn-light">
            <i class="bi bi-info-circle-fill me-1"></i> Acerca
        </a>

        {% if current_user.is_authenticated %}
            <span class="ms-2 text-white">
                <i class="bi bi-person-circle me-1"></i> {{ current_user.email }}
            </span>

            <a href="/logout" class="btn btn-danger ms-2">
                <i class="bi bi-box-arrow-right me-1"></i> Salir
            </a>

        {% else %}

            <a href="/login" class="btn btn-success ms-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </a>

            <a href="/registro" class="btn btn-primary ms-2">
                <i class="bi bi-person-plus-fill me-1"></i> Registro
            </a>

        {% endif %}

    </div>

  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
