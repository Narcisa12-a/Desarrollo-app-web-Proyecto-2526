{% extends "base.html" %}

{% block content %}

<h2>👤 Clientes</h2>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
    </tr>

    {% for cliente in clientes %}
    <tr>
        <td>{{ cliente[0] }}</td>
        <td>{{ cliente[1] }}</td>
        <td>{{ cliente[2] }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
