{% extends "base.html" %}

{% block content %}

<h2> Clientes</h2>

<a href="{{ url_for('crear_cliente') }}" class="btn btn-success mb-3">
    Nuevo Cliente
</a>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
    </tr>

    {% for cliente in clientes %}
    <tr>
        <td>{{ cliente[0] }}</td>
        <td>{{ cliente[1] }}</td>
        <td>{{ cliente[2] }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
