{% extends "base.html" %}

{% block content %}

<h2>Inventario de Postres</h2>

<a href="/agregar">Agregar Producto</a>

<table>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cantidad</th>
<th>Precio</th>
</tr>

{% for p in productos %}

<tr>
<td>{{p.id}}</td>
<td>{{p.nombre}}</td>
<td>{{p.cantidad}}</td>
<td>{{p.precio}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
