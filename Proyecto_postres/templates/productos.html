{% extends "base.html" %}

{% block content %}

<h2>Inventario de Postres</h2>

<a href="/agregar">Agregar Producto</a>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cantidad</th>
<th>Precio</th>
</tr>

{% for p in productos %}

<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
