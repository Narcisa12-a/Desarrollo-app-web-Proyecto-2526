{% extends "base.html" %}

{% block content %}

<h2>🧾 Ventas</h2>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>Cliente</th>
        <th>Producto</th>
        <th>Cantidad</th>
    </tr>

    {% for venta in ventas %}
    <tr>
        <td>{{ venta[0] }}</td>
        <td>{{ venta[1] }}</td>
        <td>{{ venta[2] }}</td>
        <td>{{ venta[3] }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
